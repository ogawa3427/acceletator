; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; shared settings for all targets
[env]
platform = espressif32
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified
    https://github.com/m5stack/M5Unit-Synth.git
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; CoreS3 (prototype, has LCD) — default target
[env:m5stack-atoms3]
board = m5stack-cores3

; StampS3 (miniaturized, no screen). If this board id is unknown to PlatformIO,
; fall back to: board = esp32-s3-devkitc-1
[env:stamps3]
board = m5stack-stamps3